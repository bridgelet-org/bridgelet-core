name: Test Contracts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Contracts
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.89.0
        target: wasm32v1-none
        override: true
        components: rustfmt, clippy

    - name: Ensure rustfmt and clippy are installed
      run: rustup component add rustfmt clippy

    - name: Install stellar-cli
      run: curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps

    - name: Install soroban-cli
      run: cargo install --locked stellar-cli --version 23.4.1

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build all contracts
      run: stellar contract build

    - name: Run tests
      run: |
        cd contracts/ephemeral_account
        cargo test --verbose
        cd ../sweep_controller
        cargo test --verbose
        cargo test --verbose --test integration
        cd ../reserve_contract
        cargo test --verbose
        cd ../account_factory
        cargo test --verbose

    - name: Check format
      run: |
        cd contracts/ephemeral_account
        cargo fmt -- --check
        cd ../sweep_controller
        cargo fmt -- --check
        cd ../reserve_contract
        cargo fmt -- --check
        cd ../account_factory
        cargo fmt -- --check

    - name: Run clippy
      run: |
        cd contracts/ephemeral_account
        cargo clippy -- -D warnings
        cd ../sweep_controller
        cargo clippy -- -D warnings
        cd ../reserve_contract
        cargo clippy -- -D warnings
        cd ../account_factory
        cargo clippy -- -D warnings

    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wasm-contracts
        path: target/wasm32v1-none/release/*.wasm
        retention-days: 30

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.89.0
        override: true
        components: rustfmt, clippy

    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-target-coverage-${{ hashFiles('**/Cargo.lock') }}

    - name: Generate coverage report
      run: |
        cargo llvm-cov --workspace --lcov --output-path lcov.info --ignore-tests

    - name: Coverage summary
      run: |
        cargo llvm-cov --workspace --text --output-path coverage.txt
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -30 coverage.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          lcov.info
          coverage.txt
        retention-days: 30