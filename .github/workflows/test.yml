name: Test Contracts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Contracts
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.89.0
        target: wasm32v1-none
        override: true
        # rustfmt + clippy are required by the Check format and Run
        # clippy steps below; actions-rs/toolchain@v1 only installs
        # rustc/cargo/rust-std by default.
        components: rustfmt, clippy
        profile: minimal

    - name: Install soroban-cli
      run: cargo install --locked soroban-cli --version 22.0.0

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Run tests
      run: |
        cd contracts/ephemeral_account
        cargo test --verbose
        cd ../sweep_controller
        cargo test --verbose
        cd ../reserve_contract
        cargo test --verbose

    - name: Check format
      run: |
        cd contracts/ephemeral_account
        cargo fmt -- --check
        cd ../sweep_controller
        cargo fmt -- --check
        cd ../reserve_contract
        cargo fmt -- --check

    - name: Run clippy
      run: |
        cd contracts/ephemeral_account
        cargo clippy -- -D warnings
        cd ../sweep_controller
        cargo clippy -- -D warnings
        cd ../reserve_contract
        cargo clippy -- -D warnings

    - name: Build all contracts
      run: |
        cd contracts/ephemeral_account
        cargo build --target wasm32v1-none --release
        cd ../sweep_controller
        cargo build --target wasm32v1-none --release
        cd ../reserve_contract
        cargo build --target wasm32v1-none --release

    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wasm-contracts
        path: |
          contracts/ephemeral_account/target/wasm32v1-none/release/*.wasm
          contracts/sweep_controller/target/wasm32v1-none/release/*.wasm
          contracts/reserve_contract/target/wasm32v1-none/release/*.wasm
        retention-days: 30
