name: Deploy to Testnet

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deployment trigger'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.89.0
        target: wasm32v1-none
        override: true
        components: rustfmt, clippy

    - name: Ensure rustfmt and clippy are installed
      run: rustup component add rustfmt clippy

    - name: Install stellar-cli
      run: curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps

    - name: Install soroban-cli
      run: cargo install --locked stellar-cli --version 23.4.1

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build all contracts
      run: stellar contract build

    - name: Run tests
      run: |
        cd contracts/ephemeral_account
        cargo test --verbose
        cd ../sweep_controller
        cargo test --verbose
        cargo test --verbose --test integration
        cd ../reserve_contract
        cargo test --verbose
        cd ../account_factory
        cargo test --verbose

    - name: Check format
      run: |
        cd contracts/ephemeral_account
        cargo fmt -- --check
        cd ../sweep_controller
        cargo fmt -- --check
        cd ../reserve_contract
        cargo fmt -- --check
        cd ../account_factory
        cargo fmt -- --check

    - name: Run clippy
      run: |
        cd contracts/ephemeral_account
        cargo clippy -- -D warnings
        cd ../sweep_controller
        cargo clippy -- -D warnings
        cd ../reserve_contract
        cargo clippy -- -D warnings
        cd ../account_factory
        cargo clippy -- -D warnings

    - name: Deploy to Stellar Testnet
      env:
        SIGNER_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        AUTHORIZED_SIGNER_PUBLIC_KEY: ${{ secrets.TESTNET_AUTHORIZED_SIGNER_PUBLIC_KEY }}
        RECOVERY_ADDRESS: ${{ secrets.TESTNET_RECOVERY_ADDRESS }}
        CREATOR_ADDRESS: ${{ secrets.TESTNET_CREATOR_ADDRESS }}
        RESERVE_ADMIN_ADDRESS: ${{ secrets.TESTNET_RESERVE_ADMIN_ADDRESS }}
      run: |
        chmod +x scripts/deploy-testnet.sh
        ./scripts/deploy-testnet.sh

    - name: Upload contract IDs as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: contract-ids
        path: deployment-artifacts/contract-ids.txt
        retention-days: 90

    - name: Post deployment summary
      run: |
        echo "## 🚀 Testnet Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Contracts have been successfully deployed to Stellar Testnet!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Contract IDs" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat deployment-artifacts/contract-ids.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY